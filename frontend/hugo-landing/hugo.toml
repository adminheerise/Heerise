baseurl = "http://localhost:1313/"
title = "Heerise"
theme = "hugo-universal-theme"
languageCode = "en-us"
defaultContentLanguage = "en"

# number of words of summarized post content (default 70)
summaryLength = 70

# not pluralize title pages by default
pluralizelisttitles = false

[services]
  [services.disqus]
  shortname = ""
  [services.googleAnalytics]
  id = "G-5EMD9R7JS2"

[pagination]
  pagerSize = 10

# ============================================================
# Main Menu (matches Figma design)
# HOME | ABOUT | AI CAREER CO-PILOT | SERVICE | CONTACT
# ============================================================
[menu]
[[menu.main]]
  name       = "HOME"
  identifier = "menu.home"
  url        = "/"
  weight     = 1

[[menu.main]]
  name       = "ABOUT"
  identifier = "menu.about"
  url        = "/about/"
  weight     = 2

[[menu.main]]
  name       = "AI CAREER CO-PILOT"
  identifier = "menu.acc"
  url        = "/acc/"
  weight     = 3

[[menu.main]]
  name       = "SERVICE"
  identifier = "menu.service"
  url        = ""
  weight     = 4

  [[menu.main]]
    name       = "CAREER LAB"
    identifier = "menu.service.careerlab"
    parent     = "menu.service"
    url        = "/career-lab/courses/"
    weight     = 1

  [[menu.main]]
    name       = "WORKSHOP"
    identifier = "menu.service.workshop"
    parent     = "menu.service"
    url        = "/career-lab/workshop/"
    weight     = 2

[[menu.main]]
  name       = "CONTACT"
  identifier = "menu.contact"
  url        = "/contact/"
  weight     = 5

# No topbar menu entries (new design has no top info bar)

# ============================================================
# Site Params
# ============================================================
[params]
  viewMorePostLink = "/blog/"
  author = "Heerise Team"
  defaultKeywords = ["heerise", "career", "coaching", "instructional design", "LXD"]
  mainSections = ["blog"]
  defaultDescription = "Heerise - Design Your Future With Confidence"

  # Social media
  facebook_site = ""
  twitter_site = ""
  default_sharing_image = "img/sharing-default.png"

  # Google Maps (disabled)
  enableGoogleMaps = false
  googleMapsApiKey = ""

  latitude = ""
  longitude = ""

  # Style: default (light-blue) — we override colors via custom.css
  style = "default"

  # Contact form (Formspree — configure when ready)
  formspree_action = ""
  contact_form_ajax = false
  enableRecaptchaInContactForm = false
  googleRecaptchaKey = ""

  about_us = "<p>Heerise Academy is your AI-powered career coaching platform for education and social science professionals.</p>"
  copyright = "© 2026 Heerise Academy. All Rights Reserved."

  date_format = "January 2, 2006"

  dropdown_mouse_over = false

  # LUMINA SIM — floating notes module (match content front matter `id`).
  # Enabled on every stage from the Zoom meeting onward. Add ids here as new post-Zoom stages ship.
  lumina_notes_page_ids = [
    "stakeholder-kickoff-zoom-meeting",
    "stakeholder-kickoff-brief-organize",
    "stakeholder-kickoff-gap-analysis",
    "stakeholder-kickoff-research",
    "stakeholder-kickoff-research-workspace",
    "stakeholder-kickoff-outreach-email",
  ]

  disabled_logo = false
  logo_text = "Heerise"

  logo = "img/logo-transparent.png"
  logo_small = "img/logo-transparent.png"
  contact_url = "/contact"
  address = """<p class="text-uppercase"><strong>Heerise Academy</strong>
    <br>Design Your Future With Confidence
  </p>
  """

[permalinks]
  blog = "/blog/:year/:month/:day/:slug/"

# ============================================================
# Top bar — DISABLED (new design has no top info bar)
# ============================================================
[params.topbar]
  enable = false
  text = ""

# Sidebar widgets (for blog pages, if accessed directly)
[params.widgets]
  categories = true
  tags = true
  search = true

# ============================================================
# OLD homepage sections — ALL DISABLED
# ============================================================
[params.carouselCustomers]
  items = 6
  auto_play = false
  slide_speed = 2000
  pagination_speed = 1000

[params.carouselTestimonials]
  items = 4
  auto_play = false
  slide_speed = 2000
  pagination_speed = 1000

[params.carouselHomepage]
  enable = false
  auto_play = false
  slide_speed = 2000
  pagination_speed = 1000

[params.features]
  enable = false
  cols = 3

[params.testimonials]
  enable = false
  title = ""
  subtitle = ""

[params.see_more]
  enable = false
  icon = ""
  title = ""
  subtitle = ""
  link_url = ""
  link_text = ""

[params.clients]
  enable = false
  title = ""
  subtitle = ""

[params.recent_posts]
  enable = false
  title = ""
  subtitle = ""
  hide_summary = false

[params.footer.recent_posts]
  enable = false

# ============================================================
# NEW: Homepage Hero (data-driven)
# ============================================================
[params.hero]
  line1 = "Harvest"
  line2 = "Empowerment"
  line3 = "Excellence"
  tagline = "To democratize career success by equipping individuals with the clarity, capabilities, and confidence to thrive in evolving and competitive job markets."

# ============================================================
# NEW: Featured Event (data-driven)
# ============================================================
[params.featured_event]
  enable = true
  label = "Upcoming Event"
  badge = "Featured"
  title = "Career Lab Workshop"
  # Event date/time pill shown inline next to the title (replaces the
  # old "Coming Soon" pill and the countdown block).
  subtitle = "8-9PM, April 28, 2026"
  # Compact mode keeps the two-column layout but hides the stats + countdown
  # that are part of the non-compact variant.
  coming_soon = true
  countdown_deadline = ""
  cta_text = "REGISTER NOW"
  cta_url = "/career-lab/workshop/"
  # Featured event hero image — Career Lab session photo.
  image = "/img/career-lab-hero.png"
  image_alt = "Career Lab session in progress"
  # Description — new "Ready to Start Your Career..." webinar content.
  # When description_heading / description_points are set they render in
  # place of the older description1 / description2 paragraphs.
  description_heading = "Ready to Start Your Career in the U.S.?"
  description_intro = "Learn how international students navigate the U.S. job market:"
  description_points = [
    "Current market trends",
    "Job-search strategies",
    "Where to find opportunities",
    "How to design strong resumes and cover letters that secure interviews",
  ]
  # Legacy fallback paragraphs (ignored when description_heading is set).
  description1 = ""
  description2 = ""
  # Speaker block — renders inside a bordered card on the homepage featured
  # event. Leave speaker_name empty to hide the whole block.
  speaker_name = "Christa Hunter"
  speaker_title = "Director of Career Services<br/>Graduate School of Education, University of Pennsylvania"
  speaker_avatar = "/img/career-lab-workshop-speaker.png"

# ============================================================
# NEW: Social links for footer
# ============================================================
[params.social]
  linkedin = "https://www.linkedin.com/company/heerise-academy/"
  rednote = "https://www.xiaohongshu.com/user/profile/56a2ba9c4775a729d5355df6"

[taxonomies]
  category = "categories"
  tag = "tags"
  author = "authors"
