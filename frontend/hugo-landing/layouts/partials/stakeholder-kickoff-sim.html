<!-- *** LUMINA • SIM — intro; CTA below grey box *** -->
<section class="sks-page sks-page--lumina-dialog sks-page--sim-intro" aria-label="Lumina simulation scene">
    <div class="sks-shell">
        <header class="sks-top">
            <div class="sks-brand">LUMINA &bull; SIM</div>
            <nav class="sks-nav" aria-label="Simulation steps">
                <span class="sks-step sks-step-active">Assignment Brief</span>
                <span class="sks-step">Research</span>
                <span class="sks-step">Outreach Email</span>
                <span class="sks-step">Meeting Agenda</span>
                <span class="sks-step">Kick-off Call</span>
                <span class="sks-step">Manager Brief</span>
                <span class="sks-step">Results</span>
            </nav>
        </header>

        <div class="sks-main">
            <div class="sks-scene">
                <div class="sks-person">
                    <img src="/img/lumina-manager.png" alt="Maya, your manager" />
                </div>
                <div class="sks-dialog-col">
                    <div class="sks-bubble sks-bubble--organize">
                        <div class="sks-bubble-copy">
                            <p class="sks-line-lead">Hi [name], I&rsquo;m Maya, your manager, Welcome again to the team!</p>
                            <p class="sks-line-body">We have a new project, I&rsquo;ll send more details through the chat.</p>
                            <p class="sks-line-body">Keep an eye out for the message!</p>
                        </div>
                    </div>
                    <div class="sks-actions sks-actions--below-bubble">
                        <a href="{{ "/acc/stakeholder-kickoff/workspace/" | relURL }}" class="sks-btn">Sure thing!</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
