<!-- Favicon: Heerise logo (cache-busted to force refresh after deploy) -->
<link rel="icon" href="/img/logo-transparent.png?v=2" type="image/png" sizes="any">
<link rel="shortcut icon" href="/img/logo-transparent.png?v=2" type="image/png">
<link rel="apple-touch-icon" href="/img/logo-transparent.png?v=2">

<!-- Inter font (replaces theme's Roboto) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

{{ if eq .Params.id "stakeholder-kickoff" }}
<link href="{{ "css/stakeholder-kickoff.css" | relURL }}?{{ now.Unix }}" rel="stylesheet">
{{ end }}

{{ if or (eq .Params.id "stakeholder-kickoff-sim") (eq .Params.id "stakeholder-kickoff-workspace") (eq .Params.id "stakeholder-kickoff-brief-organize") (eq .Params.id "stakeholder-kickoff-gap-analysis") }}
<link href="{{ "css/stakeholder-kickoff-sim.css" | relURL }}?{{ now.Unix }}" rel="stylesheet">
{{ end }}

<!-- Navbar: #017AFF override (loads last - overrides theme purple/teal) -->
<style>
:root {
  --primary-accent: #017AFF !important;
  --navbar-focus: #017AFF !important;
}
.navbar-default .navbar-nav > li > a {
  color: #2C2C2C !important;
}
.navbar-default .navbar-nav > li:not(.active) > a:hover,
.navbar-default .navbar-nav > li:not(.active) > a:focus {
  color: #017AFF !important;
  background-color: transparent !important;
}
.navbar-default .navbar-nav > li.active > a,
.navbar-default .navbar-nav > li.active > a:hover,
.navbar-default .navbar-nav > li.active > a:focus {
  color: #FFFFFF !important;
  background-color: rgba(1, 122, 255, 0.8) !important;
}
.navbar-default .navbar-nav > .open > a,
.navbar-default .navbar-nav > .open > a:hover,
.navbar-default .navbar-nav > .open > a:focus {
  color: #FFFFFF !important;
  background-color: rgba(1, 122, 255, 0.8) !important;
}
</style>

<script>
  window.HEERISE_API_BASE =
    window.location.port === "1313" ? "http://localhost:8000" : "/api";
</script>
